<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Auto Writer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      color: white;
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 1.1rem;
      opacity: 0.95;
      font-weight: 300;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 30px;
    }

    .form-group label {
      display: block;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: #2d3748;
    }

    textarea {
      width: 100%;
      padding: 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 180px;
      transition: all 0.3s ease;
      background-color: #f8f9fa;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
      background-color: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea::placeholder {
      color: #a0aec0;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button.primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    button.primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    button.primary:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    button.secondary {
      background: #f7fafc;
      color: #667eea;
      border: 2px solid #667eea;
    }

    button.secondary:hover:not(:disabled) {
      background: #667eea;
      color: white;
    }

    #loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: #667eea;
      font-weight: 600;
      font-size: 1.05rem;
    }

    #loading.show {
      display: block;
    }

    #loading::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    #output {
      margin-top: 30px;
      display: none;
    }

    #output.show {
      display: block;
    }

    .output-header {
      font-size: 1.1rem;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .output-content {
      background: #1e1e1e;
      color: #abb2bf;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      line-height: 1.6;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .copy-button {
      padding: 8px 16px;
      font-size: 0.9rem;
      text-transform: none;
      letter-spacing: normal;
      flex: 0;
    }

    .success-message {
      display: none;
      padding: 12px 16px;
      background: #c6f6d5;
      color: #22543d;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-top: 10px;
      animation: slideIn 0.3s ease;
    }

    .success-message.show {
      display: block;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error-message {
      display: none;
      padding: 12px 16px;
      background: #fed7d7;
      color: #742a2a;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-top: 10px;
      animation: slideIn 0.3s ease;
    }

    .error-message.show {
      display: block;
    }

    @media (max-width: 640px) {
      .header h1 {
        font-size: 2rem;
      }

      .card {
        padding: 24px;
      }

      .button-group {
        flex-direction: column;
      }

      body {
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✨ PR Auto Writer</h1>
    <p>Generate professional pull request descriptions from git diffs</p>
  </div>

  <div class="card">
    <form onsubmit="generate(event)">
      <div class="form-group">
        <label for="input">Git Diff Input</label>
        <textarea id="input" placeholder="Paste your git diff here..."></textarea>
      </div>

      <div class="button-group">
        <button type="submit" class="primary" id="generateBtn">Generate PR Description</button>
        <button type="reset" class="secondary">Clear</button>
      </div>
    </form>

    <div id="loading"></div>
    <div class="error-message" id="error"></div>

    <div id="output">
      <div class="output-header">
        <span>📝 Generated PR Description</span>
        <button type="button" class="copy-button secondary" onclick="copyToClipboard()">Copy</button>
      </div>
      <div class="output-content" id="outputContent"></div>
      <div class="success-message" id="success">Copied to clipboard!</div>
    </div>
  </div>
</div>

<script>
async function generate(event) {
  event.preventDefault();
  
  const input = document.getElementById("input").value;
  const output = document.getElementById("output");
  const loading = document.getElementById("loading");
  const error = document.getElementById("error");
  const outputContent = document.getElementById("outputContent");
  const generateBtn = document.getElementById("generateBtn");

  // Clear previous messages
  output.classList.remove("show");
  error.classList.remove("show");
  error.innerText = "";

  if (!input.trim()) {
    error.innerText = "⚠️ Please enter a git diff";
    error.classList.add("show");
    return;
  }

  loading.classList.add("show");
  generateBtn.disabled = true;

  try {
    const res = await fetch("http://localhost:3000/generate", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ diff: input })
    });

    if (!res.ok) {
      throw new Error("Server error");
    }

    const data = await res.json();

    outputContent.innerText = data.result;
    output.classList.add("show");
    loading.classList.remove("show");
    generateBtn.disabled = false;

  } catch (err) {
    error.innerText = "❌ Error generating response: " + err.message;
    error.classList.add("show");
    loading.classList.remove("show");
    generateBtn.disabled = false;
  }
}

function copyToClipboard() {
  const text = document.getElementById("outputContent").innerText;
  navigator.clipboard.writeText(text).then(() => {
    const success = document.getElementById("success");
    success.classList.add("show");
    setTimeout(() => {
      success.classList.remove("show");
    }, 2000);
  }).catch(err => {
    const error = document.getElementById("error");
    error.innerText = "Failed to copy to clipboard";
    error.classList.add("show");
  });
}

// Allow Enter + Cmd/Ctrl to submit
document.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
    const form = document.querySelector("form");
    form.dispatchEvent(new Event("submit"));
  }
});
</script>
</body>
</html>
